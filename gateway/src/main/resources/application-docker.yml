spring:
  # OAuth 2.0
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:your-facebook-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}

  # Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:dev-premier}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  # Liquibase — enabled in Docker
  liquibase:
    enabled: true

  # Redis — service name and password differ from base defaults
  data:
    redis:
      host: ${REDIS_HOST:redis}
      password: ${REDIS_PASSWORD:password}

  # Mail — service name differs from base default
  mail:
    host: ${MAIL_HOST:mailpit}

# JWT — no fallback; must be supplied via env var in Docker
jwt:
  secret: ${JWT_SECRET}

# Application
app:
  frontend:
    url: ${FRONTEND_URL}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  ai:
    embedding-model:
      api-key: ${OPENAI_API_KEY}
  seed:
    enabled: true

# Logging
logging:
  level:
    com.ttg.devknowledgeplatform: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
