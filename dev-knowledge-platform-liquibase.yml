services:
  liquibase:
    image: liquibase/liquibase:4.29
    container_name: dev-premier-liquibase
    restart: "no"
    entrypoint: ["liquibase"]
    command:
      - --search-path=/changelog
      - --changelog-file=dev-knowledge-platform.xml
      - --url=${LIQUIBASE_COMMAND_URL:-jdbc:postgresql://host.docker.internal:5432/dev-premier}
      - --username=${LIQUIBASE_COMMAND_USERNAME:-postgres}
      - --password=${LIQUIBASE_COMMAND_PASSWORD:-password}
      - --driver=org.postgresql.Driver
      - update
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./api/src/main/java/com/ttg/devknowledgeplatform/database/sql:/changelog:ro